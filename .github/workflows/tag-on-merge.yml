name: Tag on merge to main

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: tag-on-merge-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  tag-if-release:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'dev/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main at merge commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main  # use default GITHUB_TOKEN here

      - name: Ensure PAT is available (so downstream workflows will trigger)
        run: |
          if [ -z "${{ secrets.GH_PUSH_TOKEN }}" ]; then
            echo "::error::Missing GH_PUSH_TOKEN secret (needs repo + workflow scopes)."
            exit 1
          fi

      - name: Compute version from branch name
        id: v
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"  # e.g. dev/v1.2.3
          VERSION="${BRANCH#dev/}"                            # -> v1.2.3
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Create tag if missing (push with PAT so Release workflow triggers)
        env:
          PAT: ${{ secrets.GH_PUSH_TOKEN }}
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "Tag $VERSION already exists. Skipping."
            exit 0
          fi
          git tag -a "$VERSION" -m "Release $VERSION"
          git push "https://x-access-token:${PAT}@github.com/${{ github.repository }}.git" "$VERSION"
