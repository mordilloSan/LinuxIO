name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          make build

      - name: Create tarball
        run: |
          tar czvf linuxio-${GITHUB_REF_NAME}-linux-amd64.tar.gz linuxio-webserver linuxio-bridge

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linuxio-webserver
            linuxio-bridge
            linuxio-${{ github.ref_name }}-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
