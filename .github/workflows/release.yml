name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (leave blank to use latest v*)"
        required: false
  workflow_run:
    workflows: ["Tag on merge to main"]
    types: [completed]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          # 1) If user provided input on manual run, prefer it
          if [[ -n "${{ github.event.inputs.tag || '' }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          # 2) If this workflow was triggered by a tag push, use that tag
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && -n "${GITHUB_REF_NAME}" ]]; then
            TAG="${GITHUB_REF_NAME}"
          # 3) Otherwise, pick the latest v* tag (semver-sort)
          else
            TAG="$(git tag -l 'v*' --sort=-v:refname | head -n 1 || true)"
          fi

          if [[ -z "$TAG" ]]; then
            echo "No v* tag found. Provide one in workflow_dispatch inputs or push a v* tag."
            exit 1
          fi

          # Verify the tag exists locally
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag '$TAG' does not exist in this repo."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Checkout tag commit (build the exact sources for the tag)
        run: |
          git checkout "${{ steps.resolve_tag.outputs.tag }}"

      # Install system libs needed for CGO/dbus/PAM builds
      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libdbus-1-dev pkg-config build-essential

      - name: Cache Go build and mod
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Node for frontend
      - name: Use Node 24 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Vite)
        run: make build-vite

      - name: Download Go modules
        working-directory: backend
        run: go mod download

      - name: Build Go backend binary
        env: { GOOS: linux, GOARCH: amd64 }
        run: SKIP_LINT=1 make build-backend

      - name: Build Go bridge binary
        env: { GOOS: linux, GOARCH: amd64 }
        run: SKIP_LINT=1 make build-bridge

      - name: Make artifacts executable
        run: chmod +x linuxio-webserver linuxio-bridge

      # fix the tarball step variable
      - name: Create tarball
        run: |
          tar czvf linuxio-${{ steps.resolve_tag.outputs.tag }}-linux-amd64.tar.gz linuxio-webserver linuxio-bridge

      # attach assets to the GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            linuxio-${{ steps.resolve_tag.outputs.tag }}-linux-amd64.tar.gz
            linuxio-webserver
            linuxio-bridge
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
