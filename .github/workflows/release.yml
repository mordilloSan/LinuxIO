name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install system libs needed for CGO/dbus/PAM builds
      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libdbus-1-dev pkg-config build-essential

      # Cache Go build outputs and module cache
      - name: Cache Go build and mod
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Node.js with npm cache for frontend
      - name: Use Node 24 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Vite)
        run: make build-vite

      # Use the Go version from your module (backend/go.mod)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          check-latest: true

      - name: Download Go modules
        working-directory: backend
        run: |
          go mod tidy
          go mod download

      - name: Build Go backend binary
        run: SKIP_LINT=1 make build-backend

      - name: Build Go bridge binary
        run: SKIP_LINT=1 make build-bridge

      - name: Create tarball
        run: tar czvf linuxio-${{ github.ref_name }}-linux-amd64.tar.gz linuxio-webserver linuxio-bridge

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linuxio-webserver
            linuxio-bridge
            linuxio-${{ github.ref_name }}-linux-amd64.tar.gz
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
