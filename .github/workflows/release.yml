name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean Go Module Cache
        run: |
          rm -rf ~/go/pkg/mod
          rm -rf ~/.cache/go-build
          cd backend
          go clean -modcache
          go mod tidy

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libdbus-1-dev pkg-config build-essential

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install   # <--- or npm ci if you have package-lock.json

      - name: Build frontend (Vite)
        run: make build-vite

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download Go modules
        run: go mod tidy
        working-directory: backend

      - name: Show Go environment
        run: |
          go version
          which go
          env | grep -i go
          ls -l backend/go.*
          cd backend && go env && go list -m all && go mod graph

      - name: Build Go backend binary
        run: make build-backend
        working-directory: backend

      - name: Build Go bridge binary
        run: make build-bridge
        working-directory: backend

      - name: Create tarball
        run: |
          tar czvf linuxio-${GITHUB_REF_NAME}-linux-amd64.tar.gz linuxio-webserver linuxio-bridge

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linuxio-webserver
            linuxio-bridge
            linuxio-${{ github.ref_name }}-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
