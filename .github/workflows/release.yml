name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Go Linter
        run: make ensure-golint

      - name: Install Frontend Dependencies
        run: make setup

      - name: Download Go modules
        run: go mod tidy
        working-directory: backend

      - name: Build frontend (Vite)
        run: make build-vite

      - name: Build Go backend binary
        run: make build-backend

      - name: Build Go bridge binary
        run: make build-bridge

      - name: Create tarball
        run: tar czvf linuxio-${GITHUB_REF_NAME}-linux-amd64.tar.gz linuxio-webserver linuxio-bridge

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linuxio-webserver
            linuxio-bridge
            linuxio-${{ github.ref_name }}-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
