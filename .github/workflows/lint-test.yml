name: Lint and Test

on:
  workflow_dispatch:
  pull_request:
    branches: ["**"]
  push:
    branches: [dev, feature/**]

permissions:
  contents: read

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true
          cache-dependency-path: backend/go.sum
      # Needed for github.com/msteinert/pam (CGO)
      - name: Install PAM headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpam0g-dev
      # For embedded files in go
      - name: Create Frontend Files
        run: |
          make dev-prep
      - name: Run modernize
        working-directory: backend
        run: |
          go run golang.org/x/tools/go/analysis/passes/modernize/cmd/modernize@latest -fix ./...
          if [ -n "$(git status --porcelain -- .)" ]; then
            echo " Go modernize produced changes. Run 'make golint' locally."
            git diff -- .
            exit 1
          fi
      - uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.11.4"
          working-directory: backend
          install-mode: goinstall

  format-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - name: Check Go formatting
        working-directory: backend
        run: |
          go fmt ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo " Go files are not formatted. Run 'make golint' locally."
            git diff
            exit 1
          fi
          echo " All Go files are properly formatted"

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - run: make lint
  typescript-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - run: make tsc

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

  frontend-bundle-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Check bundle budgets
        working-directory: frontend
        run: npm run bundle:budget -- --markdown "$RUNNER_TEMP/frontend-bundle-metrics.md"
      - name: Publish bundle metrics summary
        run: cat "$RUNNER_TEMP/frontend-bundle-metrics.md" >> "$GITHUB_STEP_SUMMARY"

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
      # Needed for github.com/msteinert/pam (CGO)
      - name: Install PAM headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpam0g-dev
      # For embedded files in go
      - name: Create Frontend Files
        run: |
          make dev-prep
      - run: make test-backend
