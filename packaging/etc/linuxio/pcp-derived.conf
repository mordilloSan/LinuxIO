# =============================================================================
# LinuxIO — PCP Derived Metrics
# Loaded by pmproxy via PCP_DERIVED_CONFIG=/etc/linuxio/pcp-derived.conf
# =============================================================================

# --- Uptime (days) ---
uptime                = kernel.all.uptime / 86400

# --- CPU (percent, all cores combined) ---
# rate() returns ms/s; 1000 ms/s = 100%, so divide by (10 * ncpu)
cpu.total             = 100 - rate(kernel.all.cpu.idle) / (10 * hinv.ncpu)
cpu.user              = rate(kernel.all.cpu.user) / (10 * hinv.ncpu)
cpu.system            = rate(kernel.all.cpu.sys) / (10 * hinv.ncpu)
cpu.iowait            = rate(kernel.all.cpu.wait.total) / (10 * hinv.ncpu)
cpu.steal             = rate(kernel.all.cpu.steal) / (10 * hinv.ncpu)

# --- Per-CPU (instance domain, one value per core) ---
percpu.total          = 100 - rate(kernel.percpu.cpu.idle) / 10

# --- Memory (percent and absolute KB) ---
mem.percent           = 100 * (mem.physmem - mem.util.available) / mem.physmem
mem.used              = mem.physmem - mem.util.available
mem.free              = mem.util.available
mem.total             = mem.physmem
mem.buffers           = mem.util.bufmem
mem.cached            = mem.util.cached

# --- Swap ---
swap.percent          = 100 * (mem.util.swapTotal - mem.util.swapFree) / mem.util.swapTotal
swap.used             = mem.util.swapTotal - mem.util.swapFree
swap.total            = mem.util.swapTotal

# --- Network (bytes/sec per interface, instance domain) ---
network.rx_rate       = rate(network.interface.in.bytes)
network.tx_rate       = rate(network.interface.out.bytes)
network.rx_packets    = rate(network.interface.in.packets)
network.tx_packets    = rate(network.interface.out.packets)

# --- Disk I/O (bytes/sec per device, instance domain) ---
diskio.read_rate      = rate(disk.dev.read_bytes)
diskio.write_rate     = rate(disk.dev.write_bytes)
diskio.read_count     = rate(disk.dev.read)
diskio.write_count    = rate(disk.dev.write)

# --- Filesystem (percent per mount) ---
fs.percent            = 100 * (filesys.capacity - filesys.avail) / filesys.capacity

# --- Load average ---
load.min1             = kernel.all.load["1 minute"]
load.min5             = kernel.all.load["5 minute"]
load.min15            = kernel.all.load["15 minute"]

# --- ZFS ARC (requires pmda-zfs) ---
zfs.arc.size          = zfs.arc.size
zfs.arc.hit_percent   = 100 * zfs.arc.hits / (zfs.arc.hits + zfs.arc.misses)
zfs.arc.miss_percent  = 100 * zfs.arc.misses / (zfs.arc.hits + zfs.arc.misses)
zfs.pool.used_percent = 100 * zfs.pool.allocated / zfs.pool.size

# --- VMs (per guest, requires pmda-libvirt) ---
vm.cpu_percent        = 100 * rate(libvirt.cpu.time) / 1000000000
vm.mem.current        = libvirt.memory.current
vm.mem.maximum        = libvirt.memory.maximum
vm.mem.percent        = 100 * libvirt.memory.current / libvirt.memory.maximum
vm.disk.read_rate     = rate(libvirt.block.rd_bytes)
vm.disk.write_rate    = rate(libvirt.block.wr_bytes)
vm.net.rx_rate        = rate(libvirt.net.rx_bytes)
vm.net.tx_rate        = rate(libvirt.net.tx_bytes)

# --- SMART (per device, requires pmda-smart) ---
smart.temperature     = smart.temperature_celsius
smart.power_on_hours  = smart.power_on_hours
smart.health          = smart.health

# --- NFS client (per mount, requires pmda-nfsclient) ---
nfs.read_rate         = rate(nfsclient.bytes.read.normal)
nfs.write_rate        = rate(nfsclient.bytes.write.normal)
nfs.ops_read          = rate(nfsclient.ops.read)
nfs.ops_write         = rate(nfsclient.ops.write)

# --- Docker (per container, requires pmda-docker) ---
docker.mem_percent    = 100 * docker.memory.usage / docker.memory.limit
docker.net_rx_rate    = rate(docker.net.rx_bytes)
docker.net_tx_rate    = rate(docker.net.tx_bytes)
