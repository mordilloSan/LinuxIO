name: linuxio-monitoring

x-linuxio-stack:
  icon: "si:prometheus"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: linuxio-prometheus
    hostname: prometheus
    restart: unless-stopped
    mem_limit: 512m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.wal-compression
      - --web.enable-lifecycle
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      cadvisor:
        condition: service_healthy
      node-exporter:
        condition: service_healthy
    networks:
      - linuxio-docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "io.linuxio.container.icon=si:prometheus"

  cadvisor:
    image: ghcr.io/google/cadvisor:latest
    container_name: linuxio-cadvisor
    hostname: cadvisor
    restart: unless-stopped
    mem_limit: 128m
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - linuxio-docker
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "io.linuxio.container.icon=di:cadvisor"

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: linuxio-node-exporter
    hostname: node-exporter
    restart: unless-stopped
    mem_limit: 64m
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /:/host:ro,rslave
      - /run/udev/data:/run/udev/data:ro
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "io.linuxio.container.icon=si:prometheus"

volumes:
  prometheus_data:

networks:
  linuxio-docker:
    external: true
    name: linuxio-docker
