scrape_configs:
  - job_name: prometheus
    scrape_interval: 30s
    static_configs:
      - targets:
          - localhost:9090

  - job_name: cadvisor
    scrape_interval: 5s
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: node
    scrape_interval: 5s
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: gpu-scraper
    scrape_interval: 5s
    static_configs:
      - targets:
          - gpu-scraper:10043
