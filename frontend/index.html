<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="/favicon-5.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json" />
    <title>Linux i/O</title>
    <meta name="description" content="Linux Server" />
    <meta name="keywords" content="linux,react,go" />
    <meta name="author" content="Mordillo" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var DARK = {
            scheme: "dark",
            bg: "#1B2635",
            text: "rgba(255, 255, 255, 0.95)",
          };
          var LIGHT = {
            scheme: "light",
            bg: "#F7F9FC",
            text: "rgba(0, 0, 0, 0.87)",
          };
          function isValid(v) {
            return (
              v &&
              typeof v === "object" &&
              (v.scheme === "light" || v.scheme === "dark") &&
              typeof v.bg === "string" &&
              v.bg.length > 0 &&
              typeof v.text === "string" &&
              v.text.length > 0
            );
          }
          var t;
          if (location.pathname === "/sign-in") {
            t = DARK;
          } else {
            var stored = null;
            try {
              stored = JSON.parse(
                localStorage.getItem("linuxio_theme_bootstrap") || "null"
              );
            } catch (e) {}
            if (isValid(stored)) {
              t = stored;
            } else {
              t =
                window.matchMedia &&
                window.matchMedia("(prefers-color-scheme: light)").matches
                  ? LIGHT
                  : DARK;
            }
          }
          var s = document.documentElement.style;
          s.setProperty("--app-color-scheme", t.scheme);
          s.setProperty("--app-palette-background-default", t.bg);
          s.setProperty("--app-palette-text-primary", t.text);
        } catch (e) {}
      })();
    </script>
    <style>
      :root {
        color-scheme: var(--app-color-scheme, dark);
      }
      html,
      body {
        min-height: 100%;
      }
      body {
        margin: 0;
        background: var(--app-palette-background-default, #1b2635);
        color: var(--app-palette-text-primary, rgba(255, 255, 255, 0.95));
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
